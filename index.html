<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes" />
    <title>Milk Dairy</title>

    <!-- Firebase SDKs -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
            }
        }
    </script>

    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #d1fae5;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #0f172a;
            --text-light: #64748b;
            --border: #e2e8f0;
            --shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
            --radius: 16px;
            --radius-sm: 12px;
            --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #0f172a;
                --card: #1e2937;
                --text: #f1f5f9;
                --text-light: #94a3b8;
                --border: #334155;
                --shadow: 0 2px 12px rgba(0, 0, 0, 0.3);
                --primary-light: #064e3b;
            }
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
            padding: 0 0 80px 0;
            transition: background 0.2s ease;
            min-height: 100vh;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 9999px;
        }

        /* Auth */
        #auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        #auth-container.hidden {
            opacity: 0;
            transform: scale(0.95);
            pointer-events: none;
        }
        .auth-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 40px 32px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
            animation: slideUp 0.5s ease;
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(24px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .auth-logo {
            font-size: 56px;
            margin-bottom: 4px;
        }
        .auth-title {
            font-size: 26px;
            font-weight: 700;
            color: var(--text);
        }
        .auth-subtitle {
            color: var(--text-light);
            margin-bottom: 28px;
            font-size: 14px;
        }
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 14px;
            background: #fff;
            color: #1e2937;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
        }
        .btn-google:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
            border-color: var(--primary);
        }
        .btn-google svg {
            width: 22px;
            height: 22px;
        }
        .auth-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
            color: var(--text-light);
            font-size: 13px;
        }
        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: var(--border);
        }
        .btn-offline {
            background: var(--text-light);
            color: white;
            border: none;
            padding: 12px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
        }
        .btn-offline:hover {
            background: #475569;
        }

        /* Nav */
        .nav {
            display: flex;
            background: var(--card);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .nav-btn {
            flex: 1 0 auto;
            padding: 12px 8px;
            text-align: center;
            background: none;
            border: none;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s ease;
            border-bottom: 3px solid transparent;
            white-space: nowrap;
            min-width: 60px;
            position: relative;
        }
        .nav-btn.active {
            color: var(--primary);
            border-bottom-color: var(--primary);
            background: var(--primary-light);
        }
        .nav-btn .badge-count {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #ef4444;
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 9999px;
            font-weight: 700;
            display: none;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 12px;
        }

        /* Cards */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 16px;
            margin-bottom: 16px;
            transition: all 0.2s ease;
        }

        /* Header */
        .app-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0 12px 0;
            flex-wrap: wrap;
            gap: 8px;
        }
        .app-header .user {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
        }
        .app-header .user img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
        }
        .app-header .sync-status {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-light);
        }
        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .sync-dot.online {
            background: #22c55e;
        }
        .sync-dot.offline {
            background: #ef4444;
        }
        .sync-dot.syncing {
            background: #f59e0b;
            animation: pulse 0.8s infinite;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.3;
            }
        }

        .btn-signout {
            background: none;
            border: none;
            color: var(--text-light);
            font-size: 13px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 6px;
            transition: background 0.2s;
        }
        .btn-signout:hover {
            background: #fee2e2;
            color: #dc2626;
        }

        /* SMS Input */
        textarea {
            width: 100%;
            min-height: 120px;
            padding: 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-family: monospace;
            background: var(--bg);
            color: var(--text);
            transition: border 0.2s ease;
            resize: vertical;
        }
        textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: var(--radius-sm);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            touch-action: manipulation;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.25);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-secondary {
            background: var(--text-light);
        }
        .btn-secondary:hover {
            background: #475569;
        }
        .btn-danger {
            background: #ef4444;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-sm {
            padding: 8px 14px;
            font-size: 13px;
            width: auto;
        }
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .btn-group .btn {
            flex: 1;
            min-width: 60px;
            margin-top: 0;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.25s ease;
        }
        .tab-content.active {
            display: block;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Records */
        .record-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 14px 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s ease;
        }
        .record-card:hover {
            border-color: var(--primary);
        }
        .date-header {
            font-size: 17px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .date-header .total-badge {
            font-size: 14px;
            background: var(--primary-light);
            padding: 2px 12px;
            border-radius: 9999px;
            color: var(--primary-dark);
        }
        .session {
            margin-bottom: 10px;
            padding: 10px 12px;
            background: var(--bg);
            border-radius: var(--radius-sm);
        }
        .session-header {
            font-weight: 600;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 6px;
        }
        .session-data {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 4px 12px;
            font-size: 13px;
        }
        .session-data .item {
            display: flex;
            justify-content: space-between;
        }
        .session-data .item .label {
            color: var(--text-light);
        }
        .session-data .item .value {
            font-weight: 500;
        }
        .total {
            font-size: 16px;
            font-weight: 700;
            color: var(--primary);
            margin-top: 8px;
            padding-top: 8px;
            border-top: 2px solid var(--border);
        }

        /* Reports */
        .report-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }
        .report-card {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 14px 10px;
            text-align: center;
            border: 1px solid var(--border);
        }
        .report-card .amount {
            font-size: 20px;
            font-weight: 700;
            color: var(--primary);
        }
        .report-card .label {
            font-size: 12px;
            color: var(--text-light);
        }
        .report-summary {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
        }
        .report-summary .stat {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 12px;
            text-align: center;
        }
        .report-summary .stat .value {
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
        }
        .report-summary .stat .label {
            font-size: 12px;
            color: var(--text-light);
        }

        /* Missing */
        .missing-item {
            padding: 10px 14px;
            border-radius: var(--radius-sm);
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            font-size: 14px;
        }
        .missing-item.danger {
            background: #fee2e2;
            color: #991b1b;
        }

        /* FAB */
        .fab {
            position: fixed;
            bottom: 80px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: var(--primary);
            color: white;
            border: none;
            font-size: 32px;
            font-weight: 300;
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.4);
            cursor: pointer;
            transition: all 0.2s ease;
            z-index: 90;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .fab:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 28px rgba(16, 185, 129, 0.5);
        }
        .fab:active {
            transform: scale(0.93);
        }

        /* Modal / Bottom Sheet */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
            backdrop-filter: blur(4px);
        }
        .modal.open {
            display: flex;
        }
        .modal-content {
            background: var(--card);
            border-radius: var(--radius) var(--radius) 0 0;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            padding: 24px 20px 32px;
            animation: slideUp 0.3s ease;
            overflow-y: auto;
        }
        .modal-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            text-align: center;
        }
        .modal .field {
            margin-bottom: 12px;
        }
        .modal .field label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-light);
            margin-bottom: 3px;
        }
        .modal .field input,
        .modal .field select {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 15px;
            background: var(--bg);
            color: var(--text);
            transition: border 0.2s ease;
        }
        .modal .field input:focus,
        .modal .field select:focus {
            outline: none;
            border-color: var(--primary);
        }
        .modal .field-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        .modal .btn-group {
            margin-top: 16px;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 140px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e2937;
            color: white;
            padding: 10px 20px;
            border-radius: 9999px;
            font-size: 14px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 1100;
            max-width: 92%;
            text-align: center;
            animation: slideUp 0.3s ease;
        }
        .toast.error {
            background: #ef4444;
        }
        .toast.success {
            background: #22c55e;
        }
        .toast.show {
            display: block;
        }

        /* Footer */
        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--card);
            padding: 8px 16px;
            text-align: center;
            font-size: 11px;
            color: var(--text-light);
            border-top: 1px solid var(--border);
            z-index: 50;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .footer .count {
            font-weight: 500;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .empty-state .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 8px;
        }
        .empty-state .sub {
            font-size: 14px;
            margin-top: 4px;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .auth-card {
                padding: 32px 24px;
            }
            .report-grid {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .report-summary {
                grid-template-columns: 1fr 1fr 1fr;
                gap: 6px;
            }
            .report-card .amount {
                font-size: 17px;
            }
            .session-data {
                grid-template-columns: 1fr 1fr;
            }
            .container {
                padding: 8px;
            }
            .card {
                padding: 14px;
            }
            .modal-content {
                padding: 20px 16px 28px;
            }
            .fab {
                bottom: 72px;
                right: 16px;
                width: 52px;
                height: 52px;
                font-size: 28px;
            }
            .toast {
                bottom: 120px;
            }
        }

        @media (max-width: 400px) {
            .report-grid {
                grid-template-columns: 1fr 1fr;
            }
            .report-summary {
                grid-template-columns: 1fr 1fr;
            }
            .session-data {
                grid-template-columns: 1fr;
            }
            .modal .field-row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

    <!-- Auth -->
    <div id="auth-container">
        <div class="auth-card">
            <div class="auth-logo">🥛</div>
            <h1 class="auth-title">Milk Dairy</h1>
            <p class="auth-subtitle">Sign in to sync your records</p>
            <button class="btn-google" id="googleSignInBtn">
                <svg viewBox="0 0 48 48">
                    <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
                    <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
                    <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
                    <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
                </svg>
                Sign in with Google
            </button>
            <div class="auth-divider">or</div>
            <button class="btn-offline" id="offlineModeBtn">Use Offline Mode</button>
            <div style="margin-top:16px;font-size:12px;color:var(--text-light);">Data stored locally + synced to cloud</div>
        </div>
    </div>

    <!-- App -->
    <div id="app" style="display:none;">
        <header>
            <div class="nav" role="tablist">
                <button class="nav-btn active" role="tab" data-tab="0">Import</button>
                <button class="nav-btn" role="tab" data-tab="1">Records</button>
                <button class="nav-btn" role="tab" data-tab="2">Reports</button>
                <button class="nav-btn" role="tab" data-tab="3">Missing</button>
            </div>
        </header>

        <div class="container">
            <!-- Import Tab -->
            <div id="tab-0" class="tab-content active">
                <div class="card">
                    <div class="app-header">
                        <div class="user">
                            <img id="userAvatar" src="" alt="avatar" style="display:none;" />
                            <span id="userName">User</span>
                        </div>
                        <div class="sync-status">
                            <span class="sync-dot online" id="syncDot"></span>
                            <span id="syncText">Online</span>
                            <button class="btn-signout" id="signOutBtn">Sign out</button>
                        </div>
                    </div>
                    <textarea id="smsInput" placeholder="Paste dairy SMS here..." aria-label="SMS text"></textarea>
                    <button class="btn" id="importBtn">📤 Import</button>
                    <div style="margin-top:6px;font-size:12px;color:var(--text-light);text-align:center;">Ctrl+Enter to import</div>
                </div>
            </div>

            <!-- Records Tab -->
            <div id="tab-1" class="tab-content">
                <div id="recordsList"></div>
            </div>

            <!-- Reports Tab -->
            <div id="tab-2" class="tab-content">
                <div class="card">
                    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;">
                        <button class="btn btn-sm btn-secondary period-btn active" data-period="1">1-10</button>
                        <button class="btn btn-sm btn-secondary period-btn" data-period="2">11-20</button>
                        <button class="btn btn-sm btn-secondary period-btn" data-period="3">21-End</button>
                    </div>
                    <div class="report-grid" id="periodReport"></div>
                </div>
                <div class="card">
                    <div class="report-summary" id="monthlySummary"></div>
                </div>
            </div>

            <!-- Missing Tab -->
            <div id="tab-3" class="tab-content">
                <div id="missingList"></div>
            </div>
        </div>

        <!-- FAB -->
        <button class="fab" id="fabBtn" aria-label="Add manual record">+</button>
    </div>

    <!-- Manual Entry Modal -->
    <div id="manualModal" class="modal">
        <div class="modal-content">
            <h2 class="modal-title">➕ Add Manual Record</h2>
            <div class="field">
                <label>Date</label>
                <input type="date" id="manualDate" />
            </div>
            <div class="field">
                <label>Session</label>
                <select id="manualSession">
                    <option value="M">Morning</option>
                    <option value="E">Evening</option>
                </select>
            </div>
            <div class="field-row">
                <div class="field"><label>Fat</label><input type="number" step="0.01" id="manualFat" placeholder="3.20" /></div>
                <div class="field"><label>CLR</label><input type="number" step="0.01" id="manualClr" placeholder="25.00" /></div>
            </div>
            <div class="field-row">
                <div class="field"><label>Qty (L)</label><input type="number" step="0.01" id="manualQty" placeholder="1.50" /></div>
                <div class="field"><label>Rate (₹)</label><input type="number" step="0.01" id="manualRate" placeholder="32.44" /></div>
            </div>
            <div class="field">
                <label>Amount (₹)</label>
                <input type="number" step="0.01" id="manualAmt" placeholder="48.66" />
            </div>
            <div class="btn-group">
                <button class="btn btn-secondary" id="manualCancel">Cancel</button>
                <button class="btn" id="manualSave">Save</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <!-- Footer -->
    <div class="footer">
        <span>🥛 Milk Dairy</span>
        <span class="count" id="recordCount">0 records</span>
    </div>

    <script type="module">
        // ----- IMPORTS -----
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import {
            getAuth,
            signInWithPopup,
            signInWithRedirect,
            GoogleAuthProvider,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        import {
            getFirestore,
            collection,
            doc,
            getDocs,
            query,
            orderBy,
            enableIndexedDbPersistence,
            onSnapshot,
            writeBatch,
            Timestamp
        } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        // ----- CONFIG -----
        const firebaseConfig = {
            apiKey: "AIzaSyDELADMY4Ddi3wuoAGLas_56zDOsR43qjg",
            authDomain: "dairy-42755.firebaseapp.com",
            projectId: "dairy-42755",
            storageBucket: "dairy-42755.firebasestorage.app",
            messagingSenderId: "557045781936",
            appId: "1:557045781936:web:54ce7425aefa240a777275"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();
        const db = getFirestore(app);

        try {
            await enableIndexedDbPersistence(db);
        } catch (e) { /* ignore */ }

        // ----- CONSTANTS -----
        const STORAGE_KEY = 'milkDairyRecords';
        const USER_KEY = 'milkDairyUser';

        // ----- STATE -----
        let records = [];
        let currentUser = null;
        let isOnline = navigator.onLine;
        let isSyncing = false;
        let pendingRecord = null;
        let pendingDate = null;
        let pendingSession = null;

        // ----- DOM REFS -----
        const $ = id => document.getElementById(id);
        const authContainer = $('auth-container');
        const appContainer = $('app');
        const googleBtn = $('googleSignInBtn');
        const offlineBtn = $('offlineModeBtn');
        const signOutBtn = $('signOutBtn');
        const userName = $('userName');
        const userAvatar = $('userAvatar');
        const smsInput = $('smsInput');
        const importBtn = $('importBtn');
        const recordsList = $('recordsList');
        const missingList = $('missingList');
        const periodReport = $('periodReport');
        const monthlySummary = $('monthlySummary');
        const syncDot = $('syncDot');
        const syncText = $('syncText');
        const recordCount = $('recordCount');
        const toast = $('toast');
        const fabBtn = $('fabBtn');
        const manualModal = $('manualModal');
        const manualDate = $('manualDate');
        const manualSession = $('manualSession');
        const manualFat = $('manualFat');
        const manualClr = $('manualClr');
        const manualQty = $('manualQty');
        const manualRate = $('manualRate');
        const manualAmt = $('manualAmt');
        const manualCancel = $('manualCancel');
        const manualSave = $('manualSave');

        // ----- UTILITY -----
        function formatDate(dateStr) {
            if (!dateStr) return '';
            const d = new Date(dateStr + 'T00:00:00');
            return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
        }

        function today() {
            return new Date().toISOString().split('T')[0];
        }

        function clamp(v) { const n = parseFloat(v); return isNaN(n) ? 0 : n; }

        function getDaysInMonth(year, month) { return new Date(year, month + 1, 0).getDate(); }

        function dailyTotal(r) { let s = 0; if (r.morning) s += r.morning.amt; if (r.evening) s += r.evening.amt; return s; }

        function findRecord(date) { return records.find(r => r.date === date); }

        // ----- TOAST -----
        function showToast(msg, type = 'success') {
            toast.textContent = msg;
            toast.className = 'toast ' + type + ' show';
            clearTimeout(toast._timer);
            toast._timer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ----- STORAGE -----
        const Storage = {
            save() {
                try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch (e) { showToast('Storage error',
                        'error'); }
            },
            load() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) { const p = JSON.parse(raw); if (Array.isArray(p)) { records = p; return; } }
                    records = [];
                } catch (e) { records = []; }
            },
            clear() { localStorage.removeItem(STORAGE_KEY);
                records = []; },
            saveUser(u) { localStorage.setItem(USER_KEY, JSON.stringify(u));
                currentUser = u; },
            loadUser() {
                try { const raw = localStorage.getItem(USER_KEY); if (raw) { currentUser = JSON.parse(raw); return currentUser; } } catch (
                e) { /* ignore */ }
                return null;
            },
            clearUser() { localStorage.removeItem(USER_KEY);
                currentUser = null; }
        };

        // ----- FIREBASE SYNC -----
        async function syncToFirebase() {
            if (!currentUser || !isOnline || isSyncing || currentUser.uid === 'offline') return;
            isSyncing = true;
            syncDot.className = 'sync-dot syncing';
            syncText.textContent = 'Syncing...';

            try {
                const userRef = doc(db, 'users', currentUser.uid);
                const recordsRef = collection(userRef, 'records');
                const snapshot = await getDocs(query(recordsRef, orderBy('date', 'desc')));
                const fbData = {};
                snapshot.forEach(d => { fbData[d.id] = d.data(); });

                const batch = writeBatch(db);
                let changed = false;

                for (const r of records) {
                    const ref = doc(recordsRef, r.date);
                    const fb = fbData[r.date];
                    const localStr = JSON.stringify(r);
                    const fbStr = fb ? JSON.stringify(fb) : '';
                    if (!fb || localStr !== fbStr) {
                        batch.set(ref, { ...r, updatedAt: Timestamp.now() });
                        changed = true;
                    }
                }

                for (const date of Object.keys(fbData)) {
                    if (!findRecord(date)) {
                        batch.delete(doc(recordsRef, date));
                        changed = true;
                    }
                }

                if (changed) { await batch.commit();
                    showToast('☁️ Synced', 'success'); } else { showToast('☁️ Up to date', 'success'); }

                syncDot.className = 'sync-dot online';
                syncText.textContent = 'Online';
            } catch (err) {
                syncDot.className = 'sync-dot offline';
                syncText.textContent = 'Offline';
                showToast('Sync error', 'error');
            }
            isSyncing = false;
        }

        async function loadFromFirebase() {
            if (!currentUser || !isOnline || currentUser.uid === 'offline') return;
            try {
                const recordsRef = collection(doc(db, 'users', currentUser.uid), 'records');
                const snapshot = await getDocs(query(recordsRef, orderBy('date', 'desc')));
                const fbRecords = [];
                snapshot.forEach(d => fbRecords.push({ ...d.data(), date: d.id }));

                let merged = false;
                const localDates = new Set(records.map(r => r.date));
                for (const fb of fbRecords) {
                    if (!localDates.has(fb.date)) { records.push(fb);
                        merged = true; }
                }
                if (merged) {
                    records.sort((a, b) => b.date.localeCompare(a.date));
                    Storage.save();
                    renderAll();
                    showToast('📥 Synced from cloud', 'success');
                }
            } catch (e) { /* ignore */ }
        }

        // ----- REAL-TIME LISTENER -----
        function setupListener() {
            if (!currentUser || currentUser.uid === 'offline') return;
            const ref = collection(doc(db, 'users', currentUser.uid), 'records');
            onSnapshot(ref, (snap) => {
                if (isSyncing) return;
                if (!isOnline) return;
                const fbRecords = [];
                snap.forEach(d => fbRecords.push({ ...d.data(), date: d.id }));
                let changed = false;
                const localDates = new Set(records.map(r => r.date));
                for (const fb of fbRecords) {
                    if (!localDates.has(fb.date)) { records.push(fb);
                        changed = true; }
                }
                if (changed) {
                    records.sort((a, b) => b.date.localeCompare(a.date));
                    Storage.save();
                    renderAll();
                    showToast('🔄 Updated from cloud', 'success');
                }
            }, (err) => { /* ignore */ });
        }

        // ----- AUTH -----
        function updateUI(user) {
            if (user) {
                authContainer.classList.add('hidden');
                appContainer.style.display = 'block';
                userName.textContent = user.displayName || 'User';
                if (user.photoURL) { userAvatar.src = user.photoURL;
                    userAvatar.style.display = 'inline'; }
                syncDot.className = 'sync-dot online';
                syncText.textContent = 'Online';
                Storage.saveUser({ uid: user.uid, displayName: user.displayName, email: user.email, photoURL: user
                        .photoURL });
                setupListener();
                loadFromFirebase().then(() => syncToFirebase());
            } else {
                authContainer.classList.remove('hidden');
                appContainer.style.display = 'none';
                Storage.clearUser();
            }
        }

        async function signInGoogle() {
            try {
                const result = await signInWithPopup(auth, provider);
                currentUser = result.user;
                updateUI(currentUser);
                showToast('Welcome!', 'success');
            } catch (err) {
                if (err.code === 'auth/popup-blocked' || err.code === 'auth/popup-closed-by-user') {
                    try {
                        await signInWithRedirect(auth, provider);
                    } catch (e2) { showToast('Sign in failed', 'error'); }
                } else if (err.code !== 'auth/cancelled-popup-request') {
                    showToast('Sign in failed: ' + err.message, 'error');
                }
            }
        }

        async function signOutUser() {
            try { await signOut(auth);
                currentUser = null;
                updateUI(null);
                showToast('Signed out', 'success'); } catch (e) { showToast('Sign out failed', 'error'); }
        }

        function offlineMode() {
            currentUser = { uid: 'offline', displayName: 'Offline' };
            updateUI(currentUser);
            Storage.saveUser(currentUser);
            syncDot.className = 'sync-dot offline';
            syncText.textContent = 'Offline';
            showToast('📴 Offline mode', 'success');
        }

        // ----- PARSER (Robust) -----
        const MONTHS = {
            'जन': '01',
            'फर': '02',
            'मार्च': '03',
            'अप्र': '04',
            'मई': '05',
            'जून': '06',
            'जुल': '07',
            'अग': '08',
            'सित': '09',
            'अक्ट': '10',
            'नव': '11',
            'दिस': '12',
            'jan': '01',
            'feb': '02',
            'mar': '03',
            'apr': '04',
            'may': '05',
            'jun': '06',
            'jul': '07',
            'aug': '08',
            'sep': '09',
            'oct': '10',
            'nov': '11',
            'dec': '12'
        };

        function normalizeText(t) {
            return t.replace(/\u200B/g, '').replace(/\u00A0/g, ' ').trim();
        }

        function extractField(text, patterns) {
            for (const p of patterns) {
                const m = text.match(p);
                if (m) return m[1];
            }
            return null;
        }

        function parseSMS(text) {
            const clean = normalizeText(text);
            const lines = clean.split(/\r?\n/).map(l => l.trim()).filter(l => l);

            let dateStr = '',
                session = '',
                fat = 0,
                clr = 0,
                qty = 0,
                rate = 0,
                amt = 0;

            for (const line of lines) {
                const lower = line.toLowerCase();

                // Date
                if (!dateStr) {
                    const dtMatch = line.match(
                        /dt:\s*(\d{1,2})\s*([a-z\u0900-\u097f]+)[\s\.॰]*(\d{2})\s*\(?\s*([me])\s*\)?/i);
                    if (dtMatch) {
                        const day = dtMatch[1].padStart(2, '0');
                        let monthRaw = dtMatch[2].toLowerCase().trim();
                        // Remove common suffixes
                        monthRaw = monthRaw.replace(/॰|\.|,| /g, '');
                        let monthNum = '07';
                        for (const [key, val] of Object.entries(MONTHS)) {
                            if (monthRaw.includes(key) || key.includes(monthRaw)) {
                                monthNum = val;
                                break;
                            }
                        }
                        const year = '20' + dtMatch[3];
                        dateStr = `${year}-${monthNum}-${day}`;
                        if (dtMatch[4]) session = dtMatch[4].toUpperCase();
                    }
                }

                // Fat
                if (!fat) { const m = line.match(/ft:\s*([\d.]+)/i); if (m) fat = clamp(m[1]); }
                // CLR
                if (!clr) { const m = line.match(/clr:\s*([\d.]+)/i); if (m) clr = clamp(m[1]); }
                // Qty
                if (!qty) { const m = line.match(/qt:\s*([\d.]+)/i); if (m) qty = clamp(m[1]); }
                // Rate
                if (!rate) { const m = line.match(/r\/ltr:\s*([\d.]+)/i) || line.match(/rate:\s*([\d.]+)/i); if (m) rate = clamp(
                        m[1]); }
                // Amount
                if (!amt) { const m = line.match(/amt:\s*([\d.]+)/i); if (m) amt = clamp(m[1]); }
            }

            // Fallback session
            if (!session) {
                if (clean.includes('(E)') || clean.toLowerCase().includes('evening')) session = 'E';
                else if (clean.includes('(M)') || clean.toLowerCase().includes('morning')) session = 'M';
            }

            if (!dateStr) throw new Error('Could not find date in SMS');
            if (!fat || !clr || !qty || !rate || !amt) {
                throw new Error('Missing fields: fat, clr, qty, rate, or amount');
            }

            return {
                date: dateStr,
                session: session || 'E',
                morning: session === 'M' ? { fat, clr, qty, rate, amt } : null,
                evening: session === 'E' ? { fat, clr, qty, rate, amt } : null
            };
        }

        // ----- DATA OPERATIONS -----
        function mergeRecord(newRecord) {
            const existing = findRecord(newRecord.date);
            if (!existing) {
                records.push({ date: newRecord.date, morning: newRecord.morning || null, evening: newRecord.evening || null });
            } else {
                if (newRecord.morning) existing.morning = newRecord.morning;
                if (newRecord.evening) existing.evening = newRecord.evening;
            }
            records.sort((a, b) => b.date.localeCompare(a.date));
            Storage.save();
            if (isOnline && currentUser && currentUser.uid !== 'offline') syncToFirebase();
        }

        function deleteSession(date, session) {
            const r = findRecord(date);
            if (!r) return false;
            if (session === 'M') r.morning = null;
            else r.evening = null;
            if (!r.morning && !r.evening) records = records.filter(x => x.date !== date);
            Storage.save();
            if (isOnline && currentUser && currentUser.uid !== 'offline') syncToFirebase();
            return true;
        }

        function deleteDay(date) {
            records = records.filter(r => r.date !== date);
            Storage.save();
            if (isOnline && currentUser && currentUser.uid !== 'offline') syncToFirebase();
        }

        // ----- IMPORT -----
        function handleImport() {
            const text = smsInput.value.trim();
            if (!text) { showToast('Paste an SMS first', 'error'); return; }
            try {
                const parsed = parseSMS(text);
                const existing = findRecord(parsed.date);
                if (existing) {
                    const sess = parsed.session;
                    if ((sess === 'M' && existing.morning) || (sess === 'E' && existing.evening)) {
                        pendingRecord = parsed;
                        pendingDate = parsed.date;
                        pendingSession = parsed.session;
                        if (confirm(`${sess === 'M' ? 'Morning' : 'Evening'} for ${formatDate(parsed.date)} exists. Replace?`)) {
                            if (pendingSession === 'M') existing.morning = pendingRecord.morning;
                            else existing.evening = pendingRecord.evening;
                            Storage.save();
                            if (isOnline && currentUser && currentUser.uid !== 'offline') syncToFirebase();
                            showToast('✅ Replaced', 'success');
                            smsInput.value = '';
                            renderAll();
                        }
                        return;
                    }
                }
                mergeRecord(parsed);
                showToast('✅ Imported', 'success');
                smsInput.value = '';
                smsInput.focus();
                renderAll();
            } catch (e) {
                showToast(e.message, 'error');
            }
        }

        // ----- RENDER -----
        function renderRecords() {
            if (!records.length) {
                recordsList.innerHTML =
                    `<div class="empty-state"><span class="icon">📭</span>No records yet.<div class="sub">Paste your first dairy SMS or tap + to add manually.</div></div>`;
                return;
            }
            let html = '';
            for (const r of records) {
                html += `<div class="record-card">`;
                html += `<div class="date-header"><span>📅 ${formatDate(r.date)}</span><span class="total-badge">₹${dailyTotal(r).toFixed(2)}</span></div>`;

                if (r.morning) {
                    html += sessionHTML(r.morning, 'Morning', 'M', r.date);
                } else {
                    html += `<div class="session"><div class="session-header">🌅 Morning <span style="color:#ef4444;font-size:12px;">Missing</span></div></div>`;
                }

                if (r.evening) {
                    html += sessionHTML(r.evening, 'Evening', 'E', r.date);
                } else {
                    html += `<div class="session"><div class="session-header">🌆 Evening <span style="color:#ef4444;font-size:12px;">Missing</span></div></div>`;
                }

                html += `<div class="total">💰 Daily Total: ₹${dailyTotal(r).toFixed(2)}</div>`;
                html += `<div class="btn-group">
                            <button class="btn btn-sm btn-secondary" data-action="edit" data-date="${r.date}">✏️ Edit</button>
                            <button class="btn btn-sm btn-danger" data-action="delete" data-date="${r.date}">🗑️ Delete</button>
                        </div>`;
                html += `</div>`;
            }
            recordsList.innerHTML = html;

            recordsList.querySelectorAll('[data-action]').forEach(el => {
                el.addEventListener('click', function() {
                    const action = this.dataset.action;
                    const date = this.dataset.date;
                    if (action === 'delete') {
                        if (confirm(`Delete ${formatDate(date)}?`)) { deleteDay(date);
                            showToast('Deleted', 'success');
                            renderAll(); }
                    } else if (action === 'edit') {
                        openManualEdit(date);
                    }
                });
            });
        }

        function sessionHTML(data, label, key, date) {
            return `<div class="session">
                        <div class="session-header">
                            <span>${key === 'M' ? '🌅' : '🌆'} ${label}</span>
                            <button class="btn btn-sm btn-danger" data-action="delete-session" data-date="${date}" data-session="${key}" style="padding:2px 10px;font-size:11px;">✕</button>
                        </div>
                        <div class="session-data">
                            <div class="item"><span class="label">Fat</span><span class="value">${data.fat}</span></div>
                            <div class="item"><span class="label">CLR</span><span class="value">${data.clr}</span></div>
                            <div class="item"><span class="label">Qty</span><span class="value">${data.qty}L</span></div>
                            <div class="item"><span class="label">Rate</span><span class="value">₹${data.rate}</span></div>
                            <div class="item" style="grid-column:span 2;"><span class="label">Amount</span><span class="value" style="font-weight:700;">₹${data.amt}</span></div>
                        </div>
                    </div>`;
        }

        function renderPeriods() {
            const today = new Date();
            const year = today.getFullYear();
            const month = today.getMonth();
            const periods = [
                { start: 1, end: 10, label: '1-10' },
                { start: 11, end: 20, label: '11-20' },
                { start: 21, end: getDaysInMonth(year, month), label: '21-End' }
            ];

            let html = '';
            for (const p of periods) {
                let total = 0,
                    count = 0;
                for (const r of records) {
                    const d = new Date(r.date + 'T00:00:00');
                    if (d.getFullYear() === year && d.getMonth() === month) {
                        const day = d.getDate();
                        if (day >= p.start && day <= p.end) { total += dailyTotal(r);
                            count++; }
                    }
                }
                html += `<div class="report-card">
                            <div class="label">${p.label}</div>
                            <div class="amount">₹${total.toFixed(2)}</div>
                            <div class="label">${count} days</div>
                        </div>`;
            }
            periodReport.innerHTML = html;
        }

        function renderMonthly() {
            if (!records.length) {
                monthlySummary.innerHTML =
                    `<div class="stat"><div class="value">0</div><div class="label">No data</div></div>`;
                return;
            }
            let totalAmt = 0,
                totalQty = 0,
                days = 0;
            for (const r of records) {
                let amt = 0,
                    qty = 0;
                if (r.morning) { amt += r.morning.amt;
                    qty += r.morning.qty; }
                if (r.evening) { amt += r.evening.amt;
                    qty += r.evening.qty; }
                totalAmt += amt;
                totalQty += qty;
                if (amt > 0) days++;
            }
            monthlySummary.innerHTML = `
                        <div class="stat"><div class="value">₹${totalAmt.toFixed(2)}</div><div class="label">Total Amount</div></div>
                        <div class="stat"><div class="value">${totalQty.toFixed(2)}L</div><div class="label">Total Milk</div></div>
                        <div class="stat"><div class="value">${days}</div><div class="label">Days</div></div>
                    `;
        }

        function renderMissing() {
            const missing = [];
            const today = new Date();
            for (let i = 0; i < 30; i++) {
                const d = new Date(today);
                d.setDate(today.getDate() - i);
                const ds = d.toISOString().split('T')[0];
                const r = findRecord(ds);
                if (!r) missing.push({ date: ds, status: 'No Record' });
                else {
                    if (!r.morning) missing.push({ date: ds, status: 'Morning Missing' });
                    if (!r.evening) missing.push({ date: ds, status: 'Evening Missing' });
                }
            }
            if (!missing.length) {
                missingList.innerHTML =
                `<div class="empty-state"><span class="icon">✅</span>All recent records complete!</div>`;
                return;
            }
            let html = '';
            for (const m of missing) {
                html += `<div class="missing-item danger">${formatDate(m.date)} — ${m.status}</div>`;
            }
            missingList.innerHTML = html;
        }

        function renderCount() {
            recordCount.textContent = `${records.length} records`;
        }

        function renderAll() {
            renderRecords();
            renderPeriods();
            renderMonthly();
            renderMissing();
            renderCount();
        }

        // ----- MANUAL ENTRY -----
        function openManualEdit(date) {
            const r = findRecord(date);
            if (!r) return;
            manualDate.value = date;
            manualModal.classList.add('open');
            // Pre-fill morning if exists, else evening
            const data = r.morning || r.evening;
            if (data) {
                manualSession.value = r.morning ? 'M' : 'E';
                manualFat.value = data.fat;
                manualClr.value = data.clr;
                manualQty.value = data.qty;
                manualRate.value = data.rate;
                manualAmt.value = data.amt;
            }
            // Store the date for editing
            manualModal._editDate = date;
        }

        function saveManual() {
            const date = manualDate.value || today();
            const session = manualSession.value;
            const fat = clamp(manualFat.value);
            const clr = clamp(manualClr.value);
            const qty = clamp(manualQty.value);
            const rate = clamp(manualRate.value);
            const amt = clamp(manualAmt.value);

            if (!fat || !clr || !qty || !rate || !amt) {
                showToast('Please fill all fields', 'error');
                return;
            }

            const newRecord = {
                date,
                session,
                morning: session === 'M' ? { fat, clr, qty, rate, amt } : null,
                evening: session === 'E' ? { fat, clr, qty, rate, amt } : null
            };

            // Check if editing an existing date
            const editDate = manualModal._editDate;
            if (editDate) {
                const existing = findRecord(editDate);
                if (existing) {
                    if (session === 'M') existing.morning = newRecord.morning;
                    else existing.evening = newRecord.evening;
                    Storage.save();
                    if (isOnline && currentUser && currentUser.uid !== 'offline') syncToFirebase();
                    showToast('✅ Updated', 'success');
                    manualModal.classList.remove('open');
                    manualModal._editDate = null;
                    renderAll();
                    return;
                }
            }

            // New record
            const existing = findRecord(date);
            if (existing) {
                if ((session === 'M' && existing.morning) || (session === 'E' && existing.evening)) {
                    if (!confirm(`${session === 'M' ? 'Morning' : 'Evening'} for ${formatDate(date)} exists. Replace?`)) return;
                    if (session === 'M') existing.morning = newRecord.morning;
                    else existing.evening = newRecord.evening;
                } else {
                    if (session === 'M') existing.morning = newRecord.morning;
                    else existing.evening = newRecord.evening;
                }
            } else {
                records.push({ date, morning: newRecord.morning, evening: newRecord.evening });
            }
            records.sort((a, b) => b.date.localeCompare(a.date));
            Storage.save();
            if (isOnline && currentUser && currentUser.uid !== 'offline') syncToFirebase();
            showToast('✅ Saved', 'success');
            manualModal.classList.remove('open');
            manualModal._editDate = null;
            renderAll();
        }

        // ----- NETWORK -----
        function updateNetwork() {
            isOnline = navigator.onLine;
            if (isOnline) {
                syncDot.className = 'sync-dot online';
                syncText.textContent = 'Online';
                if (currentUser && currentUser.uid !== 'offline') syncToFirebase();
            } else {
                syncDot.className = 'sync-dot offline';
                syncText.textContent = 'Offline';
            }
        }

        // ----- TAB SWITCHING -----
        function switchTab(index) {
            const btns = document.querySelectorAll('.nav-btn');
            const panes = document.querySelectorAll('.tab-content');
            btns.forEach((b, i) => { b.classList.toggle('active', i === index); });
            panes.forEach((p, i) => { p.classList.toggle('active', i === index); });
            if (index === 1) renderRecords();
            if (index === 2) { renderPeriods();
                renderMonthly(); }
            if (index === 3) renderMissing();
        }

        // ----- INIT -----
        function init() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    currentUser = user;
                    updateUI(user);
                } else {
                    const localUser = Storage.loadUser();
                    if (localUser && localUser.uid === 'offline') {
                        currentUser = localUser;
                        updateUI(localUser);
                    } else {
                        currentUser = null;
                        updateUI(null);
                    }
                }
            });

            Storage.load();
            renderAll();

            // Events
            googleBtn.addEventListener('click', signInGoogle);
            offlineBtn.addEventListener('click', offlineMode);
            signOutBtn.addEventListener('click', signOutUser);
            importBtn.addEventListener('click', handleImport);

            smsInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault();
                    handleImport(); }
            });

            // Manual modal
            fabBtn.addEventListener('click', () => {
                manualDate.value = today();
                manualSession.value = 'M';
                manualFat.value = '';
                manualClr.value = '';
                manualQty.value = '';
                manualRate.value = '';
                manualAmt.value = '';
                manualModal._editDate = null;
                manualModal.classList.add('open');
            });

            manualCancel.addEventListener('click', () => {
                manualModal.classList.remove('open');
                manualModal._editDate = null;
            });

            manualSave.addEventListener('click', saveManual);

            manualModal.addEventListener('click', (e) => {
                if (e.target === manualModal) { manualModal.classList.remove('open');
                    manualModal._editDate = null; }
            });

            // Period buttons
            document.querySelectorAll('.period-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    renderPeriods();
                });
            });

            // Nav
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', function() { switchTab(parseInt(this.dataset.tab)); });
            });

            // Network
            window.addEventListener('online', updateNetwork);
            window.addEventListener('offline', updateNetwork);
            updateNetwork();

            // Auto-focus
            smsInput.focus();

            console.log('🥛 Milk Dairy ready');
        }

        init();
    </script>
</body>
</html>
